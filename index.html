<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Œil de Cora | Photographe</title>
<style>
:root {
  --noir:#050505;
  --cuivre:#b87333;
  --cuivre2:#d9a06a;
  --blanc:#ffffff;
}
* { box-sizing:border-box; }
body {
  margin:0;
  min-height:100vh;
  font-family: Arial, Helvetica, sans-serif;
  background:
    radial-gradient(circle at 75% 15%, rgba(184,115,51,.35), transparent 28%),
    radial-gradient(circle at 20% 85%, rgba(184,115,51,.22), transparent 25%),
    linear-gradient(135deg, #000 0%, #070707 55%, #160f0a 100%);
  color:var(--blanc);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.card {
  width:min(520px, 96vw);
  border:1px solid rgba(184,115,51,.9);
  border-radius:28px;
  background:rgba(5,5,5,.86);
  box-shadow:0 0 50px rgba(184,115,51,.25);
  padding:28px 22px 30px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.card::before {
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(125deg, transparent 0 62%, rgba(184,115,51,.15) 63%, transparent 75%),
    repeating-linear-gradient(135deg, transparent 0 16px, rgba(184,115,51,.06) 17px 19px);
  opacity:.65;
}
.content { position:relative; z-index:1; }
.logo {
  width:235px;
  max-width:75%;
  border-radius:50%;
  margin:0 auto 18px;
  display:block;
  box-shadow:0 0 24px rgba(184,115,51,.35);
}
h1 {
  margin:0;
  font-size:28px;
  letter-spacing:5px;
  font-weight:400;
}
.subtitle {
  margin:8px 0 20px;
  color:var(--cuivre2);
  font-family: Georgia, serif;
  font-style:italic;
  font-size:22px;
}
.services {
  font-size:13px;
  letter-spacing:2px;
  color:#ddd;
  line-height:1.8;
  margin-bottom:24px;
}
.btn {
  display:block;
  text-decoration:none;
  color:#fff;
  border:1px solid rgba(184,115,51,.85);
  border-radius:14px;
  padding:15px;
  margin:12px 0;
  background:linear-gradient(135deg, rgba(184,115,51,.28), rgba(255,255,255,.03));
  letter-spacing:1px;
  font-size:16px;
}
.btn:active, .btn:hover {
  background:linear-gradient(135deg, rgba(184,115,51,.45), rgba(255,255,255,.06));
}
.footer {
  margin-top:22px;
  padding-top:18px;
  border-top:1px solid rgba(184,115,51,.45);
  color:#d8d0c8;
  font-size:14px;
  line-height:1.7;
}
.signature {
  margin-top:16px;
  color:var(--cuivre2);
  letter-spacing:4px;
  font-size:11px;
}
</style>
</head>
